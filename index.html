<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/brand/logo-dark.png" />
    <title>Adzi Purnomo | IT Programmer</title>
    <script>
      (function () {
        try {
          var theme = window.localStorage.getItem("adzi-portfolio-theme") || "dark";
          var language = window.localStorage.getItem("adzi-portfolio-language") || "en";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document.documentElement.lang = language;
        } catch (error) {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.lang = "en";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
